version: '3.8'

services:
  mysql-db:
    image: mysql:8.0
    container_name: db-veterinaria
    env_file:
      - ./Backend/ApiVeterinaria/.env
    ports:
      - "127.0.0.1:3306:3306"
    volumes:
      - db_data:/var/lib/mysql
      ##BASE DED DATOS
      - ./Database/init.sql:/docker-entrypoint-initdb.d/init.sql
    restart: unless-stopped

  backend:
    build:
      context: ./Backend/ApiVeterinaria
      dockerfile: Dockerfile
    container_name: api-veterinaria
    ports:
      - "127.0.0.1:3000:3000"
    # Carga las variables de entorno para el backend
    env_file:
      - ./Backend/ApiVeterinaria/.env
    # Sobrescribimos las variables no sensibles para asegurar que conecte
    environment:
      - DB_HOST=mysql-db
      - DB_NAME=veterinaria
    depends_on:
      - mysql-db
    restart: unless-stopped

  frontend:
    build:
      context: ./Frontend/VeterinariaAntioquia
      dockerfile: Dockerfile
    container_name: web-veterinaria
    ports:
      - "127.0.0.1:8080:8080" # Bloquea acceso externo directo, obligando a usar Nginx
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  db_data:
